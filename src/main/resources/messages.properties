# --- Reglas de negocio: Franjas horarias ---
error.cita.domingo=No se atienden citas los domingos.
error.cita.franja.minutos=Las citas solo pueden programarse en franjas de 30 minutos.
error.cita.franja.sabado=Los sábados solo se atiende de 08:00 a.m a 01:00 p.m
error.cita.franja.semana=De lunes a viernes solo se atiende de 08:00 a.m a 06:00 p.m
error.cita.fecha.rango=La fecha de inicio no puede ser posterior a la fecha de fin.

# --- Reglas de negocio: Disponibilidad ---
error.cita.medico.ocupado=El médico ya tiene una cita programada en ese horario.
error.cita.paciente.ocupado=El paciente ya tiene una cita programada en ese horario.
error.cita.paciente.fechaNacimiento=La fecha de nacimiento del paciente no puede ser en el futuro.

# --- Reglas de negocio: Cancelación y estado ---
error.cita.cancelar.estado=Solo se pueden cancelar citas en estado PROGRAMADA. Estado actual: {0}
error.cita.reprogramar.estado=Solo se pueden reprogramar citas en estado PROGRAMADA. Estado actual: {0}

# --- Reglas de negocio: Penalizaciones ---
error.cita.penalizaciones.reservar=El paciente tiene 3 o más penalizaciones en los últimos 30 días y no puede agendar nuevas citas.
error.cita.penalizaciones.reprogramar=El paciente tiene {0} penalizaciones en los últimos 30 días y no puede reprogramar citas. La reprogramación genera una cancelación adicional que podría dejarlo sin cita disponible.

